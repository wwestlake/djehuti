<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Djehuti Architect</title>
    <!-- Kept as "/" for local dev (the Blazor dev server doesn't honor a
         sub-path base href the way Vite's dev server does). Rewritten to
         "/architect/" during publish -- see the deploy workflow. -->
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />

    <!-- Mermaid: renders architecture diagrams (C4 container/deployment/etc.)
         from plain text generated by the model -> diagram pipeline. Same
         "CDN script sets a global, no bundler" pattern as Teacher's KaTeX
         and VexFlow. -->
    <script defer src="https://cdn.jsdelivr.net/npm/mermaid@11.4.1/dist/mermaid.min.js" crossorigin="anonymous"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
