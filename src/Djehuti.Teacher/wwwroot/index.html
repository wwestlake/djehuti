<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Djehuti Teacher — Learn at the Speed of AI</title>
    <!-- Kept as "/" for local dev (the Blazor dev server doesn't honor a
         sub-path base href the way Vite's dev server does). Rewritten to
         "/learn/" during publish -- see the deploy workflow. -->
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />

    <!-- KaTeX: renders LaTeX math notation inside lesson content, same as
         DjeLab's Chat pane. Loaded from CDN, not vendored. -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>

    <!-- VexFlow: renders music-theory notation topics (staff, notes, lyrics)
         from plain JSON, same "CDN script, no bundler" pattern as KaTeX. -->
    <script defer src="https://cdn.jsdelivr.net/npm/vexflow@4.2.3/build/cjs/vexflow.js" crossorigin="anonymous"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
