<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DjeLab — Djehuti Lab AI+</title>
    <!-- Kept as "/" for local dev (the Blazor dev server doesn't honor a
         sub-path base href the way Vite's dev server does). Rewritten to
         "/math/" during publish -- see the deploy workflow. -->
    <base href="/" />
    <link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
    <link rel="stylesheet" href="css/app.css" />
    <!-- If you add any scoped CSS files, uncomment the following to load them
    <link href="Djehuti.DjeLab.styles.css" rel="stylesheet" /> -->

    <!-- Ace Editor: gives the code pane line numbers, syntax highlighting,
         search, and the familiar keyboard shortcuts people expect in a real
         editor. Loaded from CDN alongside a handful of common language
         modes; Spinoza gets a small custom highlighter in our own JS helper. -->
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.8/ace.js" crossorigin="anonymous"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.8/ext-language_tools.min.js" crossorigin="anonymous"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.8/theme-tomorrow_night.min.js" crossorigin="anonymous"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.8/mode-json.min.js" crossorigin="anonymous"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.8/mode-javascript.min.js" crossorigin="anonymous"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.8/mode-typescript.min.js" crossorigin="anonymous"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.8/mode-html.min.js" crossorigin="anonymous"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.8/mode-css.min.js" crossorigin="anonymous"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.8/mode-markdown.min.js" crossorigin="anonymous"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.8/mode-python.min.js" crossorigin="anonymous"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.8/mode-sql.min.js" crossorigin="anonymous"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.8/mode-xml.min.js" crossorigin="anonymous"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.8/mode-sh.min.js" crossorigin="anonymous"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.8/mode-csharp.min.js" crossorigin="anonymous"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.8/mode-fsharp.min.js" crossorigin="anonymous" onerror="this.remove()"></script>
    <script defer src="js/ace-editor-interop.js"></script>

    <!-- KaTeX: renders LaTeX math notation in Chat pane messages. Loaded from
         a CDN rather than vendored -- defer preserves script execution order
         (katex core before auto-render). -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>

    <!-- Plotly: renders every chart type in the Graph pane, 2D and 3D, from
         one library. CDN rather than vendored -- the full bundle (needed for
         scatter3d/surface, which the smaller "basic"/"cartesian" bundles
         omit) is ~3.5MB minified, too large to justify committing to the repo. -->
    <script defer src="https://cdn.jsdelivr.net/npm/plotly.js-dist-min@2.35.2/plotly.min.js" crossorigin="anonymous"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
