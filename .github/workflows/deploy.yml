name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Build React dashboard ────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/Djehuti.Dashboard/package-lock.json

      - name: Build dashboard
        working-directory: src/Djehuti.Dashboard
        env:
          VITE_API_BASE: /djehuti
        run: |
          npm ci
          npm run build

      # ── Build F# API ─────────────────────────────────────────────────────────
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish API
        run: |
          dotnet publish src/Djehuti.Api/Djehuti.Api.fsproj \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -o artifacts/api

      # ── Deploy to server ─────────────────────────────────────────────────────
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Sync dashboard
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            src/Djehuti.Dashboard/dist/ \
            ubuntu@${{ secrets.DEPLOY_HOST }}:/var/www/djehuti/

      - name: Sync API
        run: |
          rsync -az \
            -e "ssh -i ~/.ssh/deploy_key" \
            artifacts/api/ \
            ubuntu@${{ secrets.DEPLOY_HOST }}:/opt/djehuti-api/

      - name: Relink and restart API service
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.DEPLOY_HOST }} bash -s << 'EOF'
          set -e
          chmod +x /opt/djehuti-api/Djehuti.Api
          sudo ln -sfn /var/www/djehuti /var/www/kwestkarz/djehuti
          sudo systemctl daemon-reload
          sudo systemctl enable djehuti-api
          sudo systemctl restart djehuti-api
          sleep 3
          sudo systemctl is-active djehuti-api
          EOF
