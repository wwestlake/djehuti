name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Build frontend apps ──────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            src/Djehuti.Dashboard/package-lock.json
            src/Lagdaemon.Web/package-lock.json

      - name: Build dashboard
        working-directory: src/Djehuti.Dashboard
        env:
          VITE_API_BASE: /djehuti
        run: |
          npm ci
          npm run build

      - name: Build lagdaemon.com homepage
        working-directory: src/Lagdaemon.Web
        env:
          VITE_GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.VITE_GOOGLE_OAUTH_CLIENT_ID }}
          VITE_GITHUB_OAUTH_CLIENT_ID: ${{ secrets.VITE_GITHUB_OAUTH_CLIENT_ID }}
        run: |
          npm install
          npm run build

      # ── Build F# API ─────────────────────────────────────────────────────────
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish API
        run: |
          dotnet publish src/Djehuti.Api/Djehuti.Api.fsproj \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -o artifacts/api

      # ── Deploy to server ─────────────────────────────────────────────────────
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Sync dashboard
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            src/Djehuti.Dashboard/dist/ \
            ubuntu@${{ secrets.DEPLOY_HOST }}:/var/www/djehuti/

      - name: Sync lagdaemon.com homepage
        run: |
          # --exclude=djehuti preserves the /var/www/lagdaemon/djehuti symlink
          # to /var/www/djehuti that lets lagdaemon.com/djehuti/ serve the dashboard.
          rsync -az --delete --exclude=djehuti \
            -e "ssh -i ~/.ssh/deploy_key" \
            src/Lagdaemon.Web/dist/ \
            ubuntu@${{ secrets.DEPLOY_HOST }}:/var/www/lagdaemon/

      - name: Sync API
        run: |
          rsync -az \
            -e "ssh -i ~/.ssh/deploy_key" \
            artifacts/api/ \
            ubuntu@${{ secrets.DEPLOY_HOST }}:/opt/djehuti-api/

      - name: Sync datasets
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            data/datasets/ \
            ubuntu@${{ secrets.DEPLOY_HOST }}:/opt/djehuti-api/data/datasets/

      - name: Write API environment file
        env:
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GH_OAUTH_CLIENT_ID: ${{ secrets.GH_OAUTH_CLIENT_ID }}
          GH_OAUTH_CLIENT_SECRET: ${{ secrets.GH_OAUTH_CLIENT_SECRET }}
          JWT_SIGNING_KEY: ${{ secrets.JWT_SIGNING_KEY }}
        run: |
          printf 'ASPNETCORE_URLS=http://localhost:5008\nASPNETCORE_ENVIRONMENT=Production\nDB_CONNECTION_STRING=%s\nDB_PASSWORD=%s\nGOOGLE_OAUTH_CLIENT_ID=%s\nGOOGLE_OAUTH_CLIENT_SECRET=%s\nGH_OAUTH_CLIENT_ID=%s\nGH_OAUTH_CLIENT_SECRET=%s\nJWT_SIGNING_KEY=%s\n' \
            "$DB_CONNECTION_STRING" "$DB_PASSWORD" "$GOOGLE_OAUTH_CLIENT_ID" "$GOOGLE_OAUTH_CLIENT_SECRET" "$GH_OAUTH_CLIENT_ID" "$GH_OAUTH_CLIENT_SECRET" "$JWT_SIGNING_KEY" \
            | ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.DEPLOY_HOST }} 'cat > /opt/djehuti-api/api.env && chmod 600 /opt/djehuti-api/api.env'

      - name: Relink and restart API service
        run: |
          scp -i ~/.ssh/deploy_key docs/deploy/djehuti-api.service ubuntu@${{ secrets.DEPLOY_HOST }}:/tmp/djehuti-api.service
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.DEPLOY_HOST }} bash -s << 'EOF'
          set -e
          sudo mv /tmp/djehuti-api.service /etc/systemd/system/djehuti-api.service
          chmod +x /opt/djehuti-api/Djehuti.Api
          sudo systemctl daemon-reload
          sudo systemctl enable djehuti-api
          sudo systemctl restart djehuti-api
          sleep 10
          sudo systemctl is-active djehuti-api || (sudo journalctl -u djehuti-api -n 30 && exit 1)
          EOF
