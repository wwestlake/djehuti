name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Build frontend apps ──────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            src/Djehuti.Dashboard/package-lock.json
            src/Lagdaemon.Web/package-lock.json
            src/Lagdaemon.Mud/package-lock.json

      - name: Build dashboard
        working-directory: src/Djehuti.Dashboard
        env:
          VITE_API_BASE: /djehuti
        run: |
          npm ci
          npm run build

      - name: Build lagdaemon.com homepage
        working-directory: src/Lagdaemon.Web
        env:
          VITE_GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.VITE_GOOGLE_OAUTH_CLIENT_ID }}
          VITE_GITHUB_OAUTH_CLIENT_ID: ${{ secrets.VITE_GITHUB_OAUTH_CLIENT_ID }}
        run: |
          npm install
          npm run build

      - name: Build LagDaemon MUD app
        working-directory: src/Lagdaemon.Mud
        env:
          VITE_GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.VITE_GOOGLE_OAUTH_CLIENT_ID }}
          VITE_GITHUB_OAUTH_CLIENT_ID: ${{ secrets.VITE_GITHUB_OAUTH_CLIENT_ID }}
          VITE_HCAPTCHA_SITE_KEY: ${{ secrets.VITE_HCAPTCHA_SITE_KEY }}
        run: |
          npm install
          npm run build

      # ── Build F# API ─────────────────────────────────────────────────────────
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish API
        run: |
          dotnet publish src/Djehuti.Api/Djehuti.Api.fsproj \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -o artifacts/api

      - name: Publish DjeLab
        run: |
          dotnet publish src/Djehuti.DjeLab/Djehuti.DjeLab.csproj \
            -c Release \
            -o artifacts/djelab
          # Served at lagdaemon.com/math/ -- base href stays "/" in source so
          # the local Blazor dev server works normally; rewritten here only
          # in the published output.
          sed -i 's#<base href="/" />#<base href="/math/" />#' artifacts/djelab/wwwroot/index.html

      - name: Publish Djehuti Teacher
        run: |
          dotnet publish src/Djehuti.Teacher/Djehuti.Teacher.csproj \
            -c Release \
            -o artifacts/teacher
          # Served at lagdaemon.com/learn/ -- same base-href rewrite pattern as DjeLab.
          sed -i 's#<base href="/" />#<base href="/learn/" />#' artifacts/teacher/wwwroot/index.html

      # ── Deploy to server ─────────────────────────────────────────────────────
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Sync dashboard
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            src/Djehuti.Dashboard/dist/ \
            ubuntu@${{ secrets.DEPLOY_HOST }}:/var/www/djehuti/

      - name: Sync lagdaemon.com homepage
        run: |
          # --exclude=djehuti preserves the /var/www/lagdaemon/djehuti symlink
          # to /var/www/djehuti that lets lagdaemon.com/djehuti/ serve the dashboard.
          # --exclude=mud preserves the standalone MUD app served at /mud/.
          # --exclude=math preserves the standalone DjeLab app served at /math/.
          # --exclude=learn preserves the standalone Djehuti Teacher app served at /learn/.
          rsync -az --delete --exclude=djehuti --exclude=mud --exclude=math --exclude=learn \
            -e "ssh -i ~/.ssh/deploy_key" \
            src/Lagdaemon.Web/dist/ \
            ubuntu@${{ secrets.DEPLOY_HOST }}:/var/www/lagdaemon/

      - name: Sync LagDaemon MUD app
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            src/Lagdaemon.Mud/dist/ \
            ubuntu@${{ secrets.DEPLOY_HOST }}:/var/www/lagdaemon/mud/

      - name: Sync DjeLab app
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            artifacts/djelab/wwwroot/ \
            ubuntu@${{ secrets.DEPLOY_HOST }}:/var/www/lagdaemon/math/

      - name: Sync Djehuti Teacher app
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            artifacts/teacher/wwwroot/ \
            ubuntu@${{ secrets.DEPLOY_HOST }}:/var/www/lagdaemon/learn/

      - name: Sync API
        run: |
          rsync -az \
            -e "ssh -i ~/.ssh/deploy_key" \
            artifacts/api/ \
            ubuntu@${{ secrets.DEPLOY_HOST }}:/opt/djehuti-api/

      - name: Sync datasets
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            data/datasets/ \
            ubuntu@${{ secrets.DEPLOY_HOST }}:/opt/djehuti-api/data/datasets/

      - name: Write API environment file
        env:
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GH_OAUTH_CLIENT_ID: ${{ secrets.GH_OAUTH_CLIENT_ID }}
          GH_OAUTH_CLIENT_SECRET: ${{ secrets.GH_OAUTH_CLIENT_SECRET }}
          JWT_SIGNING_KEY: ${{ secrets.JWT_SIGNING_KEY }}
          PATREON_WEBHOOK_SECRET: ${{ secrets.PATREON_WEBHOOK_SECRET }}
          PATREON_CREATOR_ACCESS_TOKEN: ${{ secrets.PATREON_CREATOR_ACCESS_TOKEN }}
          PATREON_CREATOR_REFRESH_TOKEN: ${{ secrets.PATREON_CREATOR_REFRESH_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_REGION: ${{ secrets.S3_REGION }}
        run: |
          printf 'ASPNETCORE_URLS=http://localhost:5008\nASPNETCORE_ENVIRONMENT=Production\nRUN_DB_MIGRATIONS=false\nDB_CONNECTION_STRING=%s\nDB_PASSWORD=%s\nGOOGLE_OAUTH_CLIENT_ID=%s\nGOOGLE_OAUTH_CLIENT_SECRET=%s\nGH_OAUTH_CLIENT_ID=%s\nGH_OAUTH_CLIENT_SECRET=%s\nJWT_SIGNING_KEY=%s\nPATREON_WEBHOOK_SECRET=%s\nPATREON_CREATOR_ACCESS_TOKEN=%s\nPATREON_CREATOR_REFRESH_TOKEN=%s\nOPENAI_API_KEY=%s\nAWS_ACCESS_KEY_ID=%s\nAWS_SECRET_ACCESS_KEY=%s\nS3_BUCKET=%s\nS3_REGION=%s\nDJEHUTI_ANALYST_MODEL=gpt-4o-mini\n' \
            "$DB_CONNECTION_STRING" "$DB_PASSWORD" "$GOOGLE_OAUTH_CLIENT_ID" "$GOOGLE_OAUTH_CLIENT_SECRET" "$GH_OAUTH_CLIENT_ID" "$GH_OAUTH_CLIENT_SECRET" "$JWT_SIGNING_KEY" "$PATREON_WEBHOOK_SECRET" "$PATREON_CREATOR_ACCESS_TOKEN" "$PATREON_CREATOR_REFRESH_TOKEN" "$OPENAI_API_KEY" "$AWS_ACCESS_KEY_ID" "$AWS_SECRET_ACCESS_KEY" "$S3_BUCKET" "$S3_REGION" \
            | ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.DEPLOY_HOST }} 'cat > /opt/djehuti-api/api.env && chmod 600 /opt/djehuti-api/api.env'

      - name: Run database migrations
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.DEPLOY_HOST }} \
            "sudo -u postgres psql -d djehuti -c \"ALTER TABLE users ADD COLUMN IF NOT EXISTS last_activity_at TIMESTAMPTZ; CREATE INDEX IF NOT EXISTS idx_users_last_activity_at ON users (last_activity_at); CREATE TABLE IF NOT EXISTS sponsors (id UUID PRIMARY KEY DEFAULT gen_random_uuid(), name TEXT NOT NULL, logo_url TEXT, website_url TEXT, tier TEXT NOT NULL CHECK (tier IN ('gold', 'silver', 'bronze')), blurb TEXT, active BOOLEAN NOT NULL DEFAULT true, position INT NOT NULL DEFAULT 0, created_at TIMESTAMPTZ NOT NULL DEFAULT now(), updated_at TIMESTAMPTZ NOT NULL DEFAULT now()); UPDATE heartbeat_jobs SET status = 'Pending', locked_at = NULL WHERE status = 'Processing';\""

      - name: Relink and restart API service
        run: |
          scp -i ~/.ssh/deploy_key docs/deploy/djehuti-api.service ubuntu@${{ secrets.DEPLOY_HOST }}:/tmp/djehuti-api.service
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.DEPLOY_HOST }} bash -s << 'EOF'
          set -e
          sudo mv /tmp/djehuti-api.service /etc/systemd/system/djehuti-api.service
          chmod +x /opt/djehuti-api/Djehuti.Api
          sudo systemctl daemon-reload
          sudo systemctl enable djehuti-api
          sudo systemctl restart djehuti-api
          sleep 10
          sudo systemctl is-active djehuti-api || (sudo journalctl -u djehuti-api -n 30 && exit 1)
          EOF
