name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Build React dashboard ────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/Djehuti.Dashboard/package-lock.json

      - name: Install dashboard dependencies
        run: npm ci
        working-directory: src/Djehuti.Dashboard

      - name: Build dashboard
        run: npm run build
        working-directory: src/Djehuti.Dashboard
        env:
          VITE_API_BASE: /djehuti

      # ── Build F# API ─────────────────────────────────────────────────────────
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish API
        run: |
          dotnet publish src/Djehuti.Api/Djehuti.Api.fsproj \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -o artifacts/api

      # ── Deploy to server ─────────────────────────────────────────────────────
      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy.pem
          chmod 600 ~/.ssh/deploy.pem
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Stop API service
        run: |
          ssh -i ~/.ssh/deploy.pem \
            -o ConnectTimeout=15 \
            -o StrictHostKeyChecking=no \
            ubuntu@${{ secrets.DEPLOY_HOST }} \
            "sudo systemctl stop djehuti-api 2>/dev/null || true" || true

      - name: Upload dashboard static files
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy.pem -o StrictHostKeyChecking=no" \
            src/Djehuti.Dashboard/dist/ \
            ubuntu@${{ secrets.DEPLOY_HOST }}:/var/www/djehuti/

      - name: Upload API binary
        run: |
          rsync -az \
            -e "ssh -i ~/.ssh/deploy.pem -o StrictHostKeyChecking=no" \
            artifacts/api/ \
            ubuntu@${{ secrets.DEPLOY_HOST }}:/opt/djehuti-api/

      - name: Fix permissions and restart API
        run: |
          ssh -i ~/.ssh/deploy.pem \
            -o StrictHostKeyChecking=no \
            ubuntu@${{ secrets.DEPLOY_HOST }} << 'EOF'
            chmod +x /opt/djehuti-api/Djehuti.Api
            sudo systemctl daemon-reload
            sudo systemctl enable djehuti-api
            sudo systemctl start djehuti-api
            sleep 2
            sudo systemctl status djehuti-api --no-pager
          EOF
