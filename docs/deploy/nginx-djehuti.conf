# Location blocks for the lagdaemon.com server block (/etc/nginx/sites-enabled/lagdaemon
# on production). Do NOT create a new server block -- these paste inside the one already there.
# This file is a reference copy of what's live; if you change the live config, update this too.

    # Djehuti API proxy
    location /djehuti/api/ {
        proxy_pass http://127.0.0.1:5008/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Djehuti dashboard SPA (Cyberscope), synced to /var/www/djehuti
    location /djehuti/ {
        try_files $uri $uri/ /djehuti/index.html;
    }

    # DjeLab (Djehuti Lab AI+) Blazor WebAssembly app, synced to
    # /var/www/lagdaemon/math/. Explicit location block (not just relying on
    # the root catch-all below) so a hard refresh on a client-side route
    # under /math/ falls back to /math/index.html, not the root site's
    # index.html.
    location /math/ {
        try_files $uri $uri/ /math/index.html;
    }

    # Djehuti Teacher ("Learn at the Speed of AI") Blazor WebAssembly app,
    # synced to /var/www/lagdaemon/learn/. Same SPA-fallback reasoning as /math/.
    location /learn/ {
        try_files $uri $uri/ /learn/index.html;
    }

    # Personal site SPA (root) -- also implicitly serves /mud/ (LagDaemon MUD,
    # synced to /var/www/lagdaemon/mud/) since those static files physically
    # exist under the same root and this catch-all's try_files finds them
    # directly; there's no dedicated /mud/ block today.
    location / {
        try_files $uri $uri/ /index.html;
    }
