# Add these location blocks inside your existing server { } block.
# Do NOT create a new server block — just paste these inside the one already there.

    # Serve the Lagdaemon.Web SPA (React Router — all paths fall back to index.html)
    location / {
        root /var/www/lagdaemon;
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Serve the Djehuti dashboard static files
    location /djehuti/ {
        alias /var/www/djehuti/;
        try_files $uri $uri/ /djehuti/index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Proxy API calls to the F# backend running on port 5008
    location /djehuti/api/ {
        proxy_pass         http://127.0.0.1:5008/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
